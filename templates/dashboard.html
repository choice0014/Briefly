<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 뉴스 요약 대시보드</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --secondary-text: #b0b0b0;
            --tech-color: #03dac6;
            --politics-color: #cf6679;
            --intl-color: #3700b3;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
        }

        header p {
            color: var(--secondary-text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .category-section {
            margin-bottom: 50px;
        }

        .category-title {
            font-size: 1.8rem;
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        .Tech .category-title { border-color: var(--tech-color); }
        .Politics .category-title { border-color: var(--politics-color); }
        .International .category-title { border-color: var(--intl-color); }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .news-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-5px);
        }

        .news-card h3 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #fff;
        }

        .summary-content {
            font-size: 0.95rem;
            color: var(--text-color);
            white-space: pre-line;
            margin-bottom: 15px;
        }

        .news-meta {
            margin-top: auto;
            font-size: 0.85rem;
            color: var(--secondary-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .news-meta a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        .news-meta a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Daily News Summary</h1>
            <p>생성 일시: {{ generated_at }}</p>
        </header>

        {% for category, articles in news_data.items() %}
        <section class="category-section {{ category }}">
            <h2 class="category-title">{{ category }}</h2>
            <div class="news-grid">
                {% for article in articles %}
                <div class="news-card">
                    <h3>{{ article.title }}</h3>
                    <div class="summary-content">
                        {{ article.ai_summary }}
                    </div>
                    <div class="news-meta">
                        <span>출처: {{ article.source }}</span>
                        <a href="{{ article.link }}" target="_blank">원문 보기</a>
                    </div>
                </div>
                {% endfor %}
            </div>
        </section>
        {% endfor %}
    </div>
</body>
</html>
