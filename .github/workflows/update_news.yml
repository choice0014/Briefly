name: Daily AI News Update

on:
  schedule:
    - cron: '0 * * * *' # 매시간 정각에 실행 (GitHub 부하에 따라 지연될 수 있음)
  push:
    branches:
      - main
  workflow_dispatch: # 수동 실행 버튼 추가

# Pages 배포에 필요한 권한 정의
permissions:
  contents: write
  pages: write
  id-token: write

# 동시 배포 제어 설정
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crawler and Summarizer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_LIMIT: 5
        run: python app.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html history/
          git commit -m "Update news dashboard [skip ci]" || echo "No changes to commit"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
