name: Daily AI News Update

on:
  schedule:
    - cron: '30 * * * *' # 매시 30분에 실행 (정각 부하를 피함)
  push:
    branches:
      - main
  workflow_dispatch: # 수동 실행 버튼 추가

# Pages 배포에 필요한 권한 정의
permissions:
  contents: write
  pages: write
  id-token: write

# 동시 배포 제어 설정
concurrency:
  group: "pages"
  cancel-in-progress: false

# Node.js 24 환경 강제 사용 (향후 버전 호환성 대비)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 배포 환경 정의 (deploy-pages v4 필수 사항)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crawler and Summarizer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_LIMIT: 5
        run: python app.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html history/
          git commit -m "Update news dashboard [skip ci]" || echo "No changes to commit"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
